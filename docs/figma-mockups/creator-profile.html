<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Profile — Creator Hub</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            display: ['"DM Sans"', 'sans-serif'],
            body: ['Inter', 'sans-serif'],
          },
          colors: {
            ink: '#0c0c0c',
            gray: '#888888',
            'light-gray': '#f6f6f6',
            'border-gray': '#eeeeee',
            navy: '#2a2f4e',
            coral: '#ff3636',
          },
          borderRadius: {
            '2xl': '16px',
            '3xl': '20px',
            '4xl': '30px',
          },
          boxShadow: {
            'soft': '0 0 30px rgba(0, 0, 0, 0.06)',
            'card': '0 4px 20px rgba(0, 0, 0, 0.04)',
          }
        }
      }
    }
  </script>
  <style>
    body { font-family: 'Inter', sans-serif; background: #f9f9f9; }
    .font-display { font-family: 'DM Sans', sans-serif; }

    .gradient-orb { position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.6; pointer-events: none; z-index: 0; }
    .orb-1 { width: 400px; height: 400px; background: radial-gradient(circle, rgba(255,150,100,0.5) 0%, transparent 70%); animation: float 8s ease-in-out infinite; }
    .orb-2 { width: 300px; height: 300px; background: radial-gradient(circle, rgba(255,100,180,0.45) 0%, transparent 70%); animation: float 10s ease-in-out infinite reverse; }
    .orb-3 { width: 350px; height: 350px; background: radial-gradient(circle, rgba(150,100,255,0.4) 0%, transparent 70%); animation: float 12s ease-in-out infinite; }

    @keyframes float {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(30px, -30px) scale(1.05); }
      66% { transform: translate(-20px, 20px) scale(0.95); }
    }

    .animate-fade-in { opacity: 0; transform: translateY(20px); animation: fadeInUp 0.7s ease-out forwards; }
    .delay-1 { animation-delay: 0.1s; }
    .delay-2 { animation-delay: 0.2s; }
    .delay-3 { animation-delay: 0.3s; }
    .delay-4 { animation-delay: 0.4s; }
    .delay-5 { animation-delay: 0.5s; }
    .delay-6 { animation-delay: 0.6s; }

    @keyframes fadeInUp {
      to { opacity: 1; transform: translateY(0); }
    }

    .hover-lift { transition: transform 0.3s ease, box-shadow 0.3s ease; }
    .hover-lift:hover { transform: translateY(-4px); box-shadow: 0 12px 40px rgba(0,0,0,0.08); }
  </style>
</head>
<body class="min-h-screen text-ink">

  <!-- Top Navbar -->
  <header class="fixed top-0 left-0 right-0 h-16 bg-white border-b border-border-gray z-50">
    <div class="h-full flex items-center justify-between px-8">
      <div class="flex items-center gap-3">
        <div class="w-8 h-8 bg-ink rounded-lg flex items-center justify-center text-white font-display font-bold text-sm">C</div>
        <span class="font-display font-semibold text-lg">Creator Hub</span>
      </div>
      <nav class="flex items-center gap-1">
        <a href="creator-invitations.html" class="px-4 py-2 rounded-xl text-gray font-medium text-sm hover:bg-light-gray transition-colors">Invitations</a>
        <a href="creator-campaigns.html" class="px-4 py-2 rounded-xl text-gray font-medium text-sm hover:bg-light-gray transition-colors">Campaigns</a>
        <a href="creator-profile.html" class="px-4 py-2 rounded-xl bg-light-gray font-medium text-sm">My Profile</a>
      </nav>
      <button class="flex items-center gap-3 pl-4 pr-3 py-2 rounded-xl hover:bg-light-gray transition-colors">
        <div class="w-8 h-8 bg-ink rounded-full flex items-center justify-center text-white text-xs font-semibold">N</div>
        <span class="text-xs font-medium">influencer1@example.com</span>
        <svg class="w-3 h-3 text-gray" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/></svg>
      </button>
    </div>
  </header>

  <!-- Main Content -->
  <main class="pt-24 lg:px-64 sm:px-32 px-10 pb-32 relative overflow-hidden">
    <!-- Gradient orbs -->
    <div class="gradient-orb orb-1 -top-20 -left-20"></div>
    <div class="gradient-orb orb-2 top-40 -right-20"></div>
    <div class="gradient-orb orb-3 bottom-40 left-1/3"></div>

    <!-- Header -->
    <div class="mb-10 animate-fade-in relative z-10">
      <h1 class="font-display font-bold text-3xl tracking-tight">My Profile</h1>
      <p class="text-gray mt-1 text-sm">Manage your creator profile and public information</p>
    </div>

    <!-- Profile Card -->
    <div class="bg-white rounded-2xl p-6 shadow-card mb-6 hover-lift animate-fade-in delay-1 relative z-10">
      <div class="flex items-center gap-4 pb-6 border-b border-border-gray">
        <div class="w-14 h-14 bg-ink/10 rounded-2xl flex items-center justify-center text-ink">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M16 12a4 4 0 10-8 0 4 4 0 008 0zm0 0v1.5a2.5 2.5 0 005 0V12a9 9 0 10-9 9m4.5-1.206a8.959 8.959 0 01-4.5 1.207"/></svg>
        </div>
        <div>
          <h2 class="font-display font-semibold text-lg">Sarah Style</h2>
          <p class="text-gray text-sm">@sarahstyle</p>
        </div>
      </div>

      <!-- Form -->
      <div class="pt-6 space-y-6">
        <div class="grid grid-cols-2 gap-6">
          <div>
            <label class="block font-medium text-sm mb-2">Display Name</label>
            <input type="text" value="Sarah Style" class="w-full px-4 py-3 rounded-xl border border-border-gray text-sm focus:outline-none focus:border-ink transition-colors">
          </div>
          <div>
            <label class="block font-medium text-sm mb-2">Handle</label>
            <input type="text" value="@sarahstyle" class="w-full px-4 py-3 rounded-xl border border-border-gray text-sm focus:outline-none focus:border-ink transition-colors">
          </div>
        </div>

        <div>
          <label class="block font-medium text-sm mb-2">Bio</label>
          <textarea rows="4" class="w-full px-4 py-3 rounded-xl border border-border-gray text-sm focus:outline-none focus:border-ink transition-colors resize-none">Fashion enthusiast sharing daily content</textarea>
        </div>

        <div>
          <label class="block font-medium text-sm mb-2">Niche</label>
          <input type="text" value="Fashion" class="w-full px-4 py-3 rounded-xl border border-border-gray text-sm focus:outline-none focus:border-ink transition-colors">
        </div>

        <div class="grid grid-cols-2 gap-6">
          <div>
            <label class="block font-medium text-sm mb-2">Followers</label>
            <input type="text" value="150000" class="w-full px-4 py-3 rounded-xl border border-border-gray text-sm focus:outline-none focus:border-ink transition-colors">
          </div>
          <div>
            <label class="block font-medium text-sm mb-2">Engagement Rate (%)</label>
            <input type="text" value="4.5" class="w-full px-4 py-3 rounded-xl border border-border-gray text-sm focus:outline-none focus:border-ink transition-colors">
          </div>
        </div>
      </div>
    </div>
  </main>

</body>
</html>
